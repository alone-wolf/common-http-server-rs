name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check --workspace --all-features

      - name: Check websocket feature combinations
        run: |
          cargo check -p websocket --no-default-features
          cargo check -p websocket --features server
          cargo check -p websocket --features client

      - name: Test workspace
        run: cargo test --workspace

      - name: Test workspace (all features)
        run: cargo test --workspace --all-features

      - name: Check examples (all features)
        run: cargo check --workspace --examples --all-features

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
